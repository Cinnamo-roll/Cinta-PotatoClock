name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-unsigned-ipa.yml"
      - "frontend/**"

permissions:
  contents: read

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.22.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build:app

      - name: Sync Capacitor iOS project
        run: pnpm exec cap sync ios

      - name: Show Xcode project info
        run: |
          xcodebuild \
            -list \
            -project ios/App/App.xcodeproj

      - name: Resolve Xcode packages
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -resolvePackageDependencies

      - name: Build unsigned iOS app
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -derivedDataPath ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find ios/build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found"
            exit 1
          fi

          rm -rf ios/ipa Payload
          mkdir -p ios/ipa Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry ios/ipa/tudou-clock-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: tudou-clock-unsigned-ipa
          path: frontend/ios/ipa/tudou-clock-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
