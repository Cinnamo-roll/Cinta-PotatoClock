server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: potato-clock-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:clock}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:clock_user}
    password: ${MYSQL_PASSWORD:clock_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
  jackson:
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:please_change_this_secret_at_least_32_chars}
  expires-in: ${JWT_EXPIRES_IN:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,https://clock.cinoo.xyz,capacitor://localhost,ionic://localhost,http://localhost,https://localhost}

app:
  info:
    app-name: ${APP_NAME:土豆时钟}
    slogan: ${APP_SLOGAN:把今天切成更容易开始的一小块}
    description: ${APP_DESCRIPTION:专注、倒计时、习惯和目标管理一体的移动端时钟。}
    official-site: ${APP_OFFICIAL_SITE:https://clock.cinoo.xyz}
    privacy-url: ${APP_PRIVACY_URL:https://clock.cinoo.xyz/privacy}
    support-email: ${APP_SUPPORT_EMAIL:support@clock.cinoo.xyz}
  release:
    version: ${APP_VERSION:1.2.3}
    build-number: ${APP_BUILD_NUMBER:6}
    release-date: ${APP_RELEASE_DATE:2026-07-12}
    force-update: ${APP_FORCE_UPDATE:false}
    changelog:
      - 修复 Android 冷启动时错误创建计时服务导致的闪退
      - 明确区分项目官网与作者个人网站
    ios:
      available: ${APP_IOS_AVAILABLE:true}
      download-url: ${APP_IOS_IPA_URL:https://clock.cinoo.xyz/downloads/tudou-clock.ipa}
      install-note: ${APP_IOS_INSTALL_NOTE:需要自行签名或通过 TestFlight/App Store 安装}
    android:
      available: ${APP_ANDROID_AVAILABLE:true}
      download-url: ${APP_ANDROID_APK_URL:https://clock.cinoo.xyz/downloads/tudou-clock.apk}
      install-note: ${APP_ANDROID_INSTALL_NOTE:下载 APK 后按系统提示安装}
  downloads:
    android:
      url: ${APP_ANDROID_APK_URL:https://clock.cinoo.xyz/downloads/tudou-clock.apk}
      version: ${APP_VERSION:1.2.3}
      size: ${APP_ANDROID_APK_SIZE:}
    ios:
      url: ${APP_IOS_IPA_URL:https://clock.cinoo.xyz/downloads/tudou-clock.ipa}
      version: ${APP_VERSION:1.2.3}
      size: ${APP_IOS_IPA_SIZE:}
      requires-self-signing: ${APP_IOS_REQUIRES_SELF_SIGNING:true}
      note: ${APP_IOS_DOWNLOAD_NOTE:后端只提供 IPA 下载地址，不负责 iOS 签名}
    testflight:
      available: ${APP_TESTFLIGHT_AVAILABLE:false}
      url: ${APP_TESTFLIGHT_URL:}
    app-store:
      available: ${APP_STORE_AVAILABLE:false}
      url: ${APP_STORE_URL:}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
