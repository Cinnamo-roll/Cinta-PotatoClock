services:
  backend:
    image: eclipse-temurin:21-jre
    container_name: potato-clock-backend
    restart: unless-stopped
    working_dir: /app
    command: ["java", "-Xms64m", "-Xmx256m", "-jar", "/app/app.jar"]
    env_file:
      - .env.production
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: shared-mysql
      MYSQL_PORT: 3306
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
    expose:
      - "8080"
    volumes:
      - ./deploy/backend/app.jar:/app/app.jar:ro
    networks:
      - potato-clock-internal
      - shared-data-net

  frontend:
    image: nginx:1.27-alpine
    container_name: potato-clock-nginx
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    volumes:
      - ./deploy/frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./downloads:/usr/share/nginx/html/downloads:ro
    networks:
      potato-clock-internal:
      proxy:
        aliases:
          - clock-potato-clock

networks:
  potato-clock-internal:
    name: potato-clock-internal
  proxy:
    external: true
  shared-data-net:
    external: true
