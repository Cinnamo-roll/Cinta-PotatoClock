services:
  mysql:
    image: mysql:8.3
    container_name: potato-clock-mysql
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clock}
      MYSQL_USER: ${MYSQL_USER:-clock_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clock_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_this_root_password}
      TZ: Asia/Shanghai
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-clock_user}", "-p${MYSQL_PASSWORD:-clock_password}"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - potato-clock-internal

  redis:
    image: redis:7-alpine
    container_name: potato-clock-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - potato-clock-internal

  backend:
    image: eclipse-temurin:21-jre
    container_name: potato-clock-backend
    restart: unless-stopped
    working_dir: /app
    command: ["java", "-jar", "/app/app.jar"]
    mem_limit: 640m
    memswap_limit: 1g
    cpus: 0.75
    pids_limit: 256
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      TZ: Asia/Shanghai
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Shanghai -Xms96m -Xmx320m -XX:MaxMetaspaceSize=160m
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    expose:
      - "8080"
    volumes:
      - ./deploy/backend/app.jar:/app/app.jar:ro
    networks:
      - potato-clock-internal

  frontend:
    image: nginx:1.27-alpine
    container_name: potato-clock-nginx
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    volumes:
      - ./deploy/frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./downloads:/usr/share/nginx/html/downloads:ro
    networks:
      potato-clock-internal:
      proxy:
        aliases:
          - clock-potato-clock

volumes:
  mysql_data:
  redis_data:

networks:
  potato-clock-internal:
    name: potato-clock-internal
  proxy:
    external: true
