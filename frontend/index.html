    <title>土豆时钟</title>
    <script>
      const theme = localStorage.getItem("potato-theme") || "system";
      const dark = theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("dark", dark);
    </script>
  </head>

    <div id="root"></div>
